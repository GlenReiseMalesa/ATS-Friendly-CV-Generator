<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ATS Friendly CV Generator</title>
    <base href="/" />
    <link rel="stylesheet" href="css/bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
 
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: #f0ede8;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: #1a1a1a;
            color: #f0ede8;
            padding: 1.2rem 2rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

            header h1 {
                font-family: 'DM Serif Display', serif;
                font-size: 1.5rem;
                font-weight: 400;
                letter-spacing: 0.02em;
            }

            header span {
                font-size: 0.75rem;
                color: #888;
                font-weight: 300;
                letter-spacing: 0.08em;
                text-transform: uppercase;
            }

        .app {
            display: flex;
            flex: 1;
            height: calc(100vh - 60px);
        }

        /* ─── LEFT PANEL ─── */
        .editor {
            width: 420px;
            min-width: 380px;
            background: #fff;
            border-right: 1px solid #ddd;
            overflow-y: auto;
            padding: 0;
            flex-shrink: 0;
        }

        .section-tab {
            display: flex;
            border-bottom: 1px solid #ece9e3;
            background: #faf9f7;
            padding: 0 1.5rem;
            gap: 0.25rem;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .tab-btn {
            padding: 0.9rem 0.75rem;
            font-size: 0.78rem;
            font-weight: 500;
            color: #999;
            border: none;
            background: none;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: color 0.2s, border-color 0.2s;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            font-family: 'DM Sans', sans-serif;
        }

            .tab-btn.active {
                color: #1a1a1a;
                border-bottom-color: #1a1a1a;
            }

            .tab-btn:hover:not(.active) {
                color: #555;
            }

        .section-panel {
            display: none;
            padding: 1.75rem 1.75rem;
        }

            .section-panel.active {
                display: block;
            }

        .field-group {
            margin-bottom: 1.25rem;
        }

        label {
            display: block;
            font-size: 0.72rem;
            font-weight: 500;
            color: #888;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 0.45rem;
        }

        input[type="text"],
        input[type="email"],
        input[type="tel"],
        input[type="url"],
        textarea,
        select {
            width: 100%;
            padding: 0.65rem 0.85rem;
            font-size: 0.9rem;
            font-family: 'DM Sans', sans-serif;
            font-weight: 300;
            color: #1a1a1a;
            background: #faf9f7;
            border: 1px solid #e0ddd8;
            border-radius: 6px;
            outline: none;
            transition: border-color 0.2s, background 0.2s;
            resize: vertical;
        }

            input:focus, textarea:focus, select:focus {
                border-color: #1a1a1a;
                background: #fff;
            }

        textarea {
            min-height: 90px;
            line-height: 1.6;
        }

        .two-col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .entry-card {
            background: #faf9f7;
            border: 1px solid #ece9e3;
            border-radius: 8px;
            padding: 1.25rem;
            margin-bottom: 1rem;
            position: relative;
        }

            .entry-card .remove-btn {
                position: absolute;
                top: 0.75rem;
                right: 0.75rem;
                background: none;
                border: none;
                cursor: pointer;
                color: #bbb;
                font-size: 1rem;
                line-height: 1;
                padding: 2px 6px;
                border-radius: 4px;
                transition: color 0.2s, background 0.2s;
            }

                .entry-card .remove-btn:hover {
                    color: #c0392b;
                    background: #fdf0ef;
                }

        .add-btn {
            width: 100%;
            padding: 0.75rem;
            border: 1px dashed #ccc;
            border-radius: 6px;
            background: none;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.85rem;
            color: #888;
            cursor: pointer;
            transition: border-color 0.2s, color 0.2s, background 0.2s;
            margin-top: 0.25rem;
        }

            .add-btn:hover {
                border-color: #1a1a1a;
                color: #1a1a1a;
                background: #faf9f7;
            }

        .skill-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 0.75rem;
        }

        .skill-tag {
            background: #1a1a1a;
            color: #f0ede8;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

            .skill-tag button {
                background: none;
                border: none;
                color: #888;
                cursor: pointer;
                font-size: 0.85rem;
                line-height: 1;
                padding: 0;
                transition: color 0.2s;
            }

                .skill-tag button:hover {
                    color: #f0ede8;
                }

        .skill-input-row {
            display: flex;
            gap: 0.5rem;
        }

            .skill-input-row input {
                flex: 1;
            }

        .add-skill-btn {
            padding: 0.65rem 1rem;
            background: #1a1a1a;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            font-family: 'DM Sans', sans-serif;
            transition: background 0.2s;
            white-space: nowrap;
        }

            .add-skill-btn:hover {
                background: #333;
            }

        .color-row {
            display: flex;
            gap: 0.6rem;
            flex-wrap: wrap;
            margin-top: 0.5rem;
        }

        .color-swatch {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: border-color 0.2s, transform 0.15s;
        }

            .color-swatch:hover {
                transform: scale(1.15);
            }

            .color-swatch.selected {
                border-color: #1a1a1a;
            }

        /* ─── RIGHT PANEL — PREVIEW ─── */
        .preview-wrapper {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .cv-page {
            width: 210mm;
            min-height: 297mm;
            background: #fff;
            box-shadow: 0 8px 40px rgba(0,0,0,0.12);
            display: flex;
            flex-direction: column;
            font-family: 'DM Sans', sans-serif;
            position: relative;
            overflow: hidden;
        }

        .cv-header {
            padding: 2.5rem 2.5rem 2rem;
            position: relative;
        }

        .cv-accent-bar {
            width: 4px;
            height: 3rem;
            background: #1a1a1a;
            position: absolute;
            left: 1.75rem;
            top: 2.5rem;
            border-radius: 2px;
            transition: background 0.3s;
        }

        .cv-name {
            font-family: 'DM Serif Display', serif;
            font-size: 2.4rem;
            font-weight: 400;
            color: #1a1a1a;
            line-height: 1.05;
            margin-left: 1rem;
        }

        .cv-title {
            font-size: 0.9rem;
            font-weight: 300;
            color: #777;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            margin-top: 0.35rem;
            margin-left: 1rem;
        }

        .cv-contact-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem 1.5rem;
            padding: 0.85rem 2.5rem;
            border-top: 1px solid #f0ede8;
            border-bottom: 1px solid #f0ede8;
            background: #faf9f7;
        }

        .cv-contact-item {
            font-size: 0.78rem;
            color: #555;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-weight: 300;
        }

            .cv-contact-item .dot {
                width: 4px;
                height: 4px;
                background: #1a1a1a;
                border-radius: 50%;
                transition: background 0.3s;
            }

        .cv-body {
            display: grid;
            grid-template-columns: 1fr 2fr;
            flex: 1;
            gap: 0;
        }

        .cv-sidebar {
            background: #faf9f7;
            padding: 1.75rem 1.5rem;
            border-right: 1px solid #ece9e3;
        }

        .cv-main {
            padding: 1.75rem 2rem;
        }

        .cv-section {
            margin-bottom: 1.75rem;
        }

        .cv-section-title {
            font-size: 0.68rem;
            font-weight: 500;
            color: #1a1a1a;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            margin-bottom: 0.85rem;
            padding-bottom: 0.45rem;
            border-bottom: 1.5px solid #1a1a1a;
            transition: border-color 0.3s;
        }

        .cv-summary {
            font-size: 0.85rem;
            line-height: 1.75;
            color: #444;
            font-weight: 300;
        }

        .cv-entry {
            margin-bottom: 1.25rem;
        }

        .cv-entry-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 0.5rem;
            margin-bottom: 0.2rem;
        }

        .cv-entry-title {
            font-size: 0.92rem;
            font-weight: 500;
            color: #1a1a1a;
        }

        .cv-entry-date {
            font-size: 0.72rem;
            color: #999;
            font-weight: 300;
            white-space: nowrap;
            padding-top: 2px;
        }

        .cv-entry-sub {
            font-size: 0.8rem;
            color: #777;
            font-weight: 300;
            margin-bottom: 0.35rem;
        }

        .cv-entry-desc {
            font-size: 0.8rem;
            line-height: 1.65;
            color: #555;
            font-weight: 300;
        }

        .cv-skill-item {
            margin-bottom: 0.6rem;
        }

        .cv-skill-label {
            font-size: 0.78rem;
            color: #444;
            font-weight: 400;
            display: inline-block;
            background: #ece9e3;
            padding: 0.25rem 0.65rem;
            border-radius: 3px;
            margin: 0.15rem 0.15rem 0.15rem 0;
        }

        .cv-placeholder {
            color: #ccc;
            font-style: italic;
            font-size: 0.82rem;
        }

        .print-btn {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: #1a1a1a;
            color: #f0ede8;
            padding: 0.85rem 1.75rem;
            border: none;
            border-radius: 6px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.88rem;
            font-weight: 500;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0,0,0,0.25);
            transition: background 0.2s, transform 0.15s;
            z-index: 100;
        }

            .print-btn:hover {
                background: #333;
                transform: translateY(-1px);
            }

        @media print {
            body {
                background: #fff;
            }

            header, .editor, .print-btn {
                display: none !important;
            }

            .preview-wrapper {
                padding: 0;
            }

            .cv-page {
                box-shadow: none;
            }
        }
    </style>
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
</body>

</html>
